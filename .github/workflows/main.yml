- name: 🚀 Executar Coletor Jarvis
        run: python coletor_jarvis.py

      - name: 🏆 Executar Fechamento Jarvis
        run: python fechamento_jarvis.py

      - name: 💾 Salvando Dados no GitHub
        run: |
          git config --global user.name "Jarvis Intelligence"
          git config --global user.email "bot@jarvis.ia"
          git add data/*.csv
          if git diff --cached --exit-code; then
            echo "Sem novos dados."
          else
            git commit -m "📊 Protocolo Jarvis: Coleta e Assertividade Sincronizadas"
            git push
          fi
