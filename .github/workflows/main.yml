name: Sistema Integrado Jarvis 2026

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */6 * * *'
    - cron: '30 23 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 Baixando Repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Instalando Dependencias
        run: pip install pandas requests

      - name: 📊 Atualizar Big Data
        run: python baixar_big_data.py

      - name: 🚀 Coletar Novos Jogos
        run: python coletor_jarvis.py

      - name: 🏆 Fechamento de Assertividade (Fim do Dia)
        run: python fechamento_jarvis.py

      - name: 💾 Salvando Evolução no GitHub
        run: |
          git config --global user.name "Jarvis Intelligence"
          git config --global user.email "bot@jarvis.ia"
          git pull --rebase origin main
          git add data/*.csv
          if git diff --cached --exit-code; then
            echo "Sem alterações para salvar."
          else
            git commit -m "📊 Protocolo Jarvis: Coleta e Fechamento Sincronizados"
            git push origin main
          fi
