name: Automação Diária Jarvis

on:
  schedule:
    - cron: '0 * * * *' # Execução automática de hora em hora
  workflow_dispatch: # Botão para você rodar manualmente agora

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão vital para o robô salvar os dados novos
    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Instalar Dependências (CORREÇÃO JARVIS v62.1)
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml

      - name: 🤖 Rodar Jarvis (sync_data.py)
        run: python sync_data.py

      - name: 💾 Salvar no GitHub (LIMPEZA DE CACHE 2024)
        run: |
          git config --global user.name "Jarvis Bot"
          git config --global user.email "jarvis@bot.com"
          git add data/database_diario.csv
          git commit -m "📊 Dados reais atualizados [Jarvis v62.1]" || echo "Sem mudanças"
          git push
