name: Automação Diária Jarvis

on:
  schedule:
    # Roda a cada 10 minutos para manter o Scanner sempre vivo
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite que você clique em "Run workflow" para testar agora

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar Dependências de Busca
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests beautifulsoup4

    - name: EXECUTAR COLETOR DE JOGOS REAIS
      run: python coletor_sites.py

    - name: Salvar Dados no Repositório (Commit)
      run: |
        git config --global user.name 'Jarvis-Bot'
        git config --global user.email 'bot@jarvis.ai'
        git add base_jogos_jarvis.csv
        git commit -m "Atualização de Jogos em Tempo Real: $(date)" || echo "Sem mudanças para salvar"
        git push
