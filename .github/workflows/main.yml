name: Atualizar Big Data Jarvis

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Baixando Repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Instalando Dependencias
        run: pip install pandas requests

      - name: 🚀 Rodar Script de Download
        run: python baixar_big_data.py

      - name: 💾 Salvando no GitHub (Blindado)
        run: |
          git config --global user.name "Jarvis Big Data"
          git config --global user.email "bot@jarvis.ia"
          git add data/*.csv
          if git diff --cached --exit-code; then
            echo "Nenhuma mudança detectada nos dados."
          else
            git commit -m "📊 Big Data Atualizado (Sincronia 2026)"
            git push
          fi
