name: Automação Diária Jarvis

on:
  schedule:
    - cron: '0 * * * *' # Roda de hora em hora
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Instalar Dependências
        run: pip install pandas requests

      - name: 🤖 Rodar Jarvis (sync_data.py)
        run: python sync_data.py

      - name: 💾 Salvar no GitHub
        run: |
          git config --global user.name "Jarvis Bot"
          git config --global user.email "jarvis@bot.com"
          git add data/database_diario.csv
          git commit -m "📊 Dados reais atualizados" || echo "Sem mudanças"
          git push
