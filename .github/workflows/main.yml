name: Automação Diária Jarvis

on:
  schedule:
    - cron: '0 0 * * *' # Execução automática à meia-noite
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão essencial para o Bot salvar o arquivo CSV no repositório
    
    steps:
      - name: 📥 Clonando o Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 Instalando Google Chrome (Ambiente Jarvis)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🛠️ Instalando Dependências do Sistema
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests selenium webdriver-manager

      - name: 🤖 Executando o Bot Jarvis (sync_data.py)
        run: python sync_data.py

      - name: 💾 Salvando Dados Novos no GitHub
        run: |
          git config --global user.name "Jarvis Bot"
          git config --global user.email "jarvis@bot.com"
          git add data/database_diario.csv
          git commit -m "📊 Jarvis: Dados Diários Atualizados [v60.0]" || echo "Sem mudanças para salvar"
          git push
