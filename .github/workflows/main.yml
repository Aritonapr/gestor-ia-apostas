name: Automação Diária Jarvis

on:
  schedule:
    - cron: '0 * * * *' # Roda de 1 em 1 hora para pegar jogos ao vivo
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Instalando Navegador e Dependências
        run: |
          pip install pandas selenium webdriver-manager
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🤖 Executando Jarvis (sync_data.py)
        run: python sync_data.py

      - name: 💾 Salvando Mudanças no GitHub
        run: |
          git config --global user.name "Jarvis Bot"
          git config --global user.email "jarvis@bot.com"
          git add data/database_diario.csv
          git commit -m "📊 Jarvis: Dados de HOJE Sincronizados" || echo "Sem mudanças"
          git push
