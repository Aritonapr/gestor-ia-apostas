name: Atualizar Big Data Jarvis

on:
  workflow_dispatch: # Isso cria o BOTÃO para você clicar e rodar manualmente
  schedule:
    - cron: '0 0 * * 1' # Roda automaticamente toda segunda-feira à meia-noite

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Baixando Repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Instalando Pandas e Requests
        run: pip install pandas requests

      - name: 🚀 Rodar Script de Download
        run: python baixar_big_data.py

      - name: 💾 Salvando arquivos no GitHub
        run: |
          git config --global user.name "Jarvis Big Data"
          git config --global user.email "bot@jarvis.ia"
          git add data/*.csv
          git commit -m "📊 Big Data Atualizado (2021-2026)" || echo "Sem mudanças"
          git push
