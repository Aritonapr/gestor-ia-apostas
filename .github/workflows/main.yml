name: Jarvis Sync Data

on:
  schedule:
    - cron: '0 8 * * *' # Roda todos os dias às 05:00 AM (Horário de Brasília)
  workflow_dispatch: # Permite que você rode manualmente se quiser

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v2

      - name: Configurar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          pip install pandas requests

      - name: Executar Sincronização
        run: python sync_data.py

      - name: Salvar alterações no GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/database_diario.csv
          git commit -m "Jarvis: Atualização diária de jogos" || exit 0
          git push
