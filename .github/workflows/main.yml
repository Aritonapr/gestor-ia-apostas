name: Automação Diária Jarvis

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 08:00 AM
  workflow_dispatch: # Permite que você rode o robô manualmente clicando em um botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Pandas
        run: pip install pandas

      - name: Rodar Coleta de Jogos
        run: python sync_data.py

      - name: Salvar dados no GitHub
        run: |
          git config --global user.name "Jarvis Automation"
          git config --global user.email "bot@jarvis.ia"
          git add data/database_diario.csv
          git commit -m "Jarvis: Atualização automática de jogos [skip ci]" || echo "Sem mudanças"
          git push
