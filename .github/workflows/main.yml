name: Automação Diária Jarvis

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente clicando no botão

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Clonando o Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Instalando Ferramentas
        run: |
          pip install pandas requests selenium webdriver-manager

      - name: 🤖 Executando o Bot Jarvis (sync_data.py)
        run: python sync_data.py

      - name: 💾 Salvando Dados Novos no GitHub
        run: |
          git config --global user.name "Jarvis Bot"
          git config --global user.email "jarvis@bot.com"
          git add data/*.csv
          git commit -m "📊 Jarvis: Dados Diários Atualizados" || echo "Sem mudanças para salvar"
          git push
